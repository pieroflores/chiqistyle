<div class="min-h-screen flex">

    <div class="hidden md:flex flex-col justify-center items-center w-1/2
                bg-pink-200 p-12 text-pink-900 shadow-2xl">

        <img class="h-40 w-auto mb-4" src="img/logochiqi.png" alt="chiquistyle Logo"/>

        <h1 class="text-4xl font-extrabold text-pink-900 text-center">
            Bienvenido al Portal
        </h1>
        <p class="mt-4 text-lg text-pink-700/90 text-center max-w-sm">
            Tu sistema de gestión de inventario y ventas. Inicia sesión para continuar.
        </p>
    </div>

    <div class="flex flex-col justify-center items-center w-full md:w-1/2
                bg-white p-6 sm:p-10 lg:p-16">

        <div class="w-full max-w-sm">

            <div class="md:hidden text-center mb-6">
                <img class="mx-auto h-20 w-auto" src="img/logochiqi.png" alt="chiquistyle Logo"/>
            </div>

            <h2 class="text-3xl font-bold text-gray-900 text-center md:text-left">
                Iniciar Sesión
            </h2>
            <p class="mt-2 text-base text-gray-600 text-center md:text-left">
                Introduce tus credenciales para acceder.
            </p>

            <form class="mt-8 space-y-6"   (ngSubmit)="login()">

                <div>
                    <label for="usuario" class="block text-sm font-medium text-gray-700">
                        Usuario o Email
                    </label>
                    <div class="mt-1">
                        <input
                            id="usuario"
                            name="usuario"
                            type="text"
                            [(ngModel)]="usuario"
                            required
                            placeholder="Usuario de MiniMusa"
                            class="appearance-none block w-full px-4 py-2.5 border border-gray-400 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-pink-400 focus:border-pink-400 sm:text-base"
                        >
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700">
                        Contraseña
                    </label>
                    <div class="mt-1">
                        <input
                            id="password"
                            name="password"
                            type="password"
                            required
                            [(ngModel)]="clave"
                            placeholder="••••••••"
                            class="appearance-none block w-full px-4 py-2.5 border border-gray-400 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-pink-400 focus:border-pink-400 sm:text-base"
                        >
                    </div>
                </div>

                <div class="flex items-center justify-between pt-2">
                    <div class="flex items-center">
                        <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-pink-400 focus:ring-pink-400 border-gray-300 rounded">
                        <label for="remember-me" class="ml-2 block text-sm text-gray-700">
                            Recordarme
                        </label>
                    </div>

                    <div class="text-sm">
                        <a href="#" class="font-semibold text-pink-400 hover:text-pink-500">
                            ¿Olvidaste la clave?
                        </a>
                    </div>
                </div>

                <div class="pt-2">
                    <button
                        type="submit"
                        class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-md text-lg font-bold text-white
                               bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500 transition duration-150 ease-in-out"
                    >
                        Ingresar al Sistema
                    </button>
                </div>
            </form>

            <div class="mt-10 text-center">
                <p class="text-xs text-gray-400">
                    Realizado por <span class="font-semibold text-gray-600">Mudsi-Perú</span>
                </p>
            </div>
        </div>
    </div>
</div>
